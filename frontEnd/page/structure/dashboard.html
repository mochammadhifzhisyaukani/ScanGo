<!doctype html>
<html lang="en">

<head>

    <link rel="icon" type="image/png" href="/frontEnd/assets/logo/favicon.png" />

    <link rel="stylesheet" href="/frontEnd/style/global.css" />

    <!-- css file view -->
    <link rel="stylesheet" href="/frontEnd/style/components/dashboard/inputStudent.css">
    <link rel="stylesheet" href="/frontEnd/style/components/dashboard/scanRfid.css">
    <link rel="stylesheet" href="/frontEnd/style/components/dashboard/detailSiswa.css ">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>

<body>

    <body>

        <div class="dashboard-container">

            <aside class="sidebar d-none d-md-flex">
                <div class="sidebar-logo">
                    <a href="/index.html">
                        <img src="/frontEnd/assets/logo/favicon.png" style="height: 30px;">
                    </a>
                </div>

                <div class="sidebar-menu">
                    <div class="menu-icon text-secondary" onclick="navigateTo('dashboard')">
                        <i class="bi bi-house-door"></i>
                        <span>Dashboard</span>
                    </div>

                    <div class="menu-icon" data-bs-toggle="modal" data-bs-target="#modalProfile">
                        <img id="profileImage" src="/frontEnd/assets/profiles/dimas.png"
                            style="height:24px; width:24px; border-radius:50%; cursor:pointer;">
                        <span>Profil Saya</span>
                    </div>

                    <div class="menu-icon active" onclick="navigateTo('dashboard')">
                        <i class="bi bi-clock"></i>
                        <span>Monitoring</span>
                    </div>

                    <div class="menu-icon" onclick="navigateTo('scan-rfid')">
                        <i class="bi bi-upc-scan"></i>
                        <span>Scan RFID</span>
                    </div>

                    <div class="menu-icon" onclick="navigateTo('print')">
                        <i class="bi bi-printer"></i>
                        <span>Cetak Data</span>
                    </div>

                    <div class="menu-icon" onclick="navigateTo('grafik')">
                        <i class="bi bi-bar-chart-line"></i>
                        <span>Grafik</span>
                    </div>

                    <div class="menu-icon" onclick="navigateTo('input-siswa')">
                        <i class="bi bi-person-fill-add"></i>
                        <span>Input Siswa</span>
                    </div>

                    <div class="menu-icon" style="margin-top: auto;" data-bs-toggle="modal"
                        data-bs-target="#modalTheme">
                        <i class="bi bi-gear"></i>
                        <span>Tema</span>
                    </div>

                    <div class="menu-icon"
                        onclick="confirm('Yakin ingin keluar dari dashboard?') ? window.location.href='/index.html' : null">
                        <i class="bi bi-box-arrow-left text-danger"></i>
                        <span class="text-danger">Keluar</span>
                    </div>
                </div>
            </aside>

            <div class="main-wrapper mt-4" style="flex: 1; display: flex; flex-direction: column;">

                <header
                    class="header-panel animate__animated animate__fadeIn pe-4 d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-light d-md-none ms-3" type="button" data-bs-toggle="offcanvas"
                            data-bs-target="#mobileMenu" aria-controls="mobileMenu">
                            <i class="bi bi-list fs-3"></i>
                        </button>
                        <h4 class="ms-2 ms-md-5 mb-0">Dashboard Monitoring</h4>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <div class="clock-date-wrapper me-3">
                            <p id="time" class="mb-0"></p>
                            <p id="date" class="mb-0"></p>
                        </div>
                    </div>
                </header>

                <main class="main-content" style="padding: 20px; overflow-y: auto;">
                    <div id="content"></div>
                </main>

            </div>

        </div>

        <div class="offcanvas offcanvas-bottom rounded-top-4" tabindex="-1" id="mobileMenu"
            aria-labelledby="mobileMenuLabel" style="height: auto; max-height: 80vh;">
            <div class="offcanvas-header border-bottom">
                <h5 class="offcanvas-title" id="mobileMenuLabel">Menu Navigasi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <div class="row g-4 text-center">
                    <div class="col-4" onclick="navigateTo('dashboard')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-house-door fs-3 text-secondary"></i>
                            <div class="small mt-1">Home</div>
                        </div>
                    </div>
                    <div class="col-4" data-bs-toggle="modal" data-bs-target="#modalProfile"
                        data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><img src="/frontEnd/assets/profiles/dimas.png"
                                style="height:30px; border-radius:50%;">
                            <div class="small mt-1">Profil</div>
                        </div>
                    </div>
                    <div class="col-4" onclick="navigateTo('dashboard')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3 text-primary"><i class="bi bi-clock fs-3"></i>
                            <div class="small mt-1 fw-bold">Monitoring</div>
                        </div>
                    </div>
                    <div class="col-4" onclick="navigateTo('scan-rfid')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-upc-scan fs-3"></i>
                            <div class="small mt-1">Scan RFID</div>
                        </div>
                    </div>
                    <div class="col-4" onclick="navigateTo('print')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-printer fs-3"></i>
                            <div class="small mt-1">Cetak</div>
                        </div>
                    </div>
                    <div class="col-4" onclick="navigateTo('grafik')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-bar-chart-line fs-3"></i>
                            <div class="small mt-1">Grafik</div>
                        </div>
                    </div>
                    <div class="col-4" onclick="navigateTo('input-siswa')" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-person-fill-add fs-3"></i>
                            <div class="small mt-1">Siswa</div>
                        </div>
                    </div>
                    <div class="col-4" data-bs-toggle="modal" data-bs-target="#modalTheme" data-bs-dismiss="offcanvas">
                        <div class="p-3 bg-light rounded-3"><i class="bi bi-gear fs-3"></i>
                            <div class="small mt-1">Tema</div>
                        </div>
                    </div>
                    <div class="col-4"
                        onclick="confirm('Yakin ingin keluar?') ? window.location.href='/index.html' : null">
                        <div class="p-3 bg-light rounded-3 text-danger"><i class="bi bi-box-arrow-left fs-3"></i>
                            <div class="small mt-1">Keluar</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalTheme" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Pengaturan</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <span>Ubah Tema</span>
                        <div id="changeTheme2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalProfile" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5>Ubah Foto Profil</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-center">
                        <img id="previewImage" src="/frontEnd/assets/profiles/dimas.png"
                            style="width:150px;height:150px;border-radius:50%;object-fit:cover;">
                        <br><br>
                        <input type="file" id="profileInput" accept="image/*" class="form-control">
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button class="btn btn-primary" id="saveProfile">Simpan</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="/frontEnd/components/toast.js"></script>
        <script src="/frontEnd/page/content/views/inputStudent.js"></script>
        <script src="/frontEnd/page/content/views/dashboad.js"></script>
        <script src="/frontEnd/page/content/views/scanRfid.js"></script>
        <script src="/frontEnd/page/content/views/detailSiswa.js"></script>
        <script src="/frontEnd/page/content/views/print.js"></script>
        <script src="/backend/routes/router.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <script src="/frontEnd/components/changetheme.js"></script>

    <script src="/frontEnd/page/content/views/inputStudent.js"></script>

    <script src="/frontEnd/page/content/views/detailSiswa.js"></script>
    <script src="/frontEnd/page/content/views/print.js"></script>
    <script src="/frontEnd/components/toast.js"></script>
    <script src="/backend/routes/router.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="/frontEnd/components/changetheme.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

                navigateTo('dashboard');
            }

            setTimeout(function () {
                if (typeof initDashboardListener === "function") {
                    console.log("Menghubungkan fungsi Tab dan Jam...");
                    initDashboardListener();
                } else {
                    console.error("Fungsi initDashboardListener tidak ditemukan!");
                }

                setTimeout(function () {
                    if (typeof initDashboardListener === "function") {
                        console.log("Menghubungkan fungsi Tab dan Jam...");
                        initDashboardListener();
                    } else {
                        console.error("Fungsi initDashboardListener tidak ditemukan!");
                    }
                }, 100);
            });
        });
        </script>
