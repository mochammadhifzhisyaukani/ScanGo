<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <title>Scan Go | Website</title>
    <link rel="icon" type="image/png" href="/frontEnd/assets/logo/favicon.png" />

    <!-- css global -->
    <link rel="stylesheet" href="/frontEnd/style/global.css" />
    <!-- css index -->
    <link rel="stylesheet" href="/frontEnd/style/index.css" />

    <!-- css component navbar -->
    <link rel="stylesheet" href="/frontEnd/style/components/navbar.css">
    <!-- css component footer -->
    <link rel="stylesheet" href="/frontEnd/style/components/footer.css">

    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <!-- link font inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- link animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- link swipper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>


<body>
    <header class="fixed-top w-100">
        <div class="container-sm">
            <nav id="navbar"></nav>
        </div>
    </header>

    <main id="content">
    </main>

    <section class="tech-stack-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/bootstrap.png" alt="Bootstrap">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/nodejs.png" alt="NodeJS">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/postgree.png" alt="PostgreSQL">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/swipper.png" alt="Swiper">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/expressjs.png" alt="ExpressJS">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/animate.png" alt="Animate CSS">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/sweetalert.png" alt="SweetAlert">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card mt-3">
                        <img src="/frontEnd/assets/logo/partners/techStack/supabase.png" alt="Supabase">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/github.png" alt="Github">
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="logo-card">
                        <img src="/frontEnd/assets/logo/partners/techStack/vercel.png" alt="Vercel">
                    </div>
                </div>



            </div>
        </div>
    </section>

    <footer id="footer" class="container-sm"></footer>

    <!-- link swipper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- script content index -->
    <script src="/frontEnd/page/content/index.js"></script>
    <!-- script component navbar -->
    <script src="/frontEnd/components/navbar.js"></script>
    <!-- script component footer -->
    <script src="/frontEnd/components/footer.js"></script>

    <!-- script bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>



    <script>
        const swiper = new Swiper('.mySwiper', {
            loop: true,
            allowTouchMove: false,

            autoplay: {
                delay: 0,
                disableOnInteraction: false,
                pauseOnMouseEnter: true,
            },

            speed: 5000,

            breakpoints: {
                320: {
                    slidesPerView: 2,
                    spaceBetween: 20
                },
                768: {
                    slidesPerView: 3,
                    spaceBetween: 30
                },
                1024: {
                    slidesPerView: 5,
                    spaceBetween: 40
                }
            }
        });

        const swiperEl = document.querySelector('.mySwiper');

        swiperEl.addEventListener('mouseenter', () => {
            swiper.autoplay.stop();
        });

        swiperEl.addEventListener('mouseleave', () => {
            swiper.autoplay.start();
        });
    </script>
</body>

</html>
