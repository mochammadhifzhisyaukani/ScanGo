<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link css navbar -->
    <link rel="stylesheet" href="/src/style/components/navbar.css">
    <!-- link css footer -->
    <link rel="stylesheet" href="/src/style/components/footer.css">

    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <!-- link font inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <!-- link style Sign In -->
    <link rel="stylesheet" href="/src/style/signIn.css">

    <title>ScanGo</title>
</head>

<body class="">
    <!-- <header>
        <nav id="navbar"></nav>
    </header> -->

    <main id="content" class="text-center d-flex justify-content-center">
        <div class="card">
            <!-- LEFT Panel-->
            <div class="left-panel">
                <div class="logo">
                    <!-- Logo: two lightning/slash marks -->
                    <img src="/src/assets/logo/favicon.png" alt="" width="60px">
                </div>

                <h1>Sign In</h1>
                <p class="subtitle">Continue to access your dashboard</p>

                <!-- Google SSO -->
                <button class="sso-btn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Sign in with Google
                </button>

                <!-- Apple SSO -->
                <button class="sso-btn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#111">
                        <path
                            d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.3.07 2.2.75 2.97.8.9-.13 1.76-.84 3.1-.9 1.24.05 2.34.47 3.16 1.35-2.82 1.78-2.38 5.7.28 6.84-.65 1.76-1.5 3.5-1.51 4.79zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" />
                    </svg>
                    Sign in with Apple
                </button>

                <div class="or-divider">OR</div>

                <div class="field-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" />
                </div>

                <div class="field-group">
                    <div class="field-header">
                        <label for="password">Password</label>
                        <span class="forgot-link">Forgot Password?</span>
                    </div>

                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" />

                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <button class="btn-signin">Sign In</button>

                <p class="create-account">Don't have an account? <a href="signUp.html">Create an Account</a></p>
            </div>

            <!-- RIGHTpanel -->
            <div class="right-panel">
                <img src="/src/assets/background/9333f00957425e173ae553ca70f5b930.png" alt="Login Banner">
            </div>
        </div>
    </main>

    <!-- <footer id="footer"></footer> -->
</body>

<!-- script component navbar -->
<script src="/src/components/navbar.js"></script>
<!-- script content Sign In -->
<script src="/src/page/content/signIn.js"></script>
<!-- script component footer -->
<script src="/src/components/footer.js"></script>


</html>
