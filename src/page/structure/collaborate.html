<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link css navbar -->
    <link rel="stylesheet" href="/src/style/components/navbar.css">
    <!-- link css footer -->
    <link rel="stylesheet" href="/src/style/components/footer.css">

    <!-- link bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <!-- link font inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- link animate css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- link style Sign In -->
    <link rel="stylesheet" href="/src/style/collaborate.css">

    <title>ScanGo</title>
</head>

<body>
    <!-- <header>
        <nav id="navbar"></nav>
    </header> -->

    <main id="content">
        <div class="container-fluid p-0">
            <div class="row min-vh-100 g-0">

                <!-- LEFT SIDE -->
                <div class="col-12 col-md-6 d-flex align-items-center justify-content-center contact-left-side">

                    <div class="contact-form-card">

                        <div class="text-center mb-4">
                            <div class="d-inline-flex p-3 rounded-circle mb-3 contact-icon-wrapper">
                                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="white"
                                    class="bi bi-people-fill" viewBox="0 0 16 16">
                                    <path
                                        d="M7 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.322 6.322 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1zM4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5" />
                                </svg>

                            </div>

                            <h1 class="fw-bold">Give your best advice</h1>
                            <p class="text-muted">You can reach us anytime</p>
                        </div>

                        <form id="contact" action="https://formspree.io/f/xdajgrvw" method="POST">

                            <div class="mb-3">
                                <label class="form-label">Nama Lengkap</label>
                                <input name="name" type="text" class="form-control contact-input" placeholder="Masukkan nama anda"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>

                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>

                                    <input name="email" type="email" class="form-control contact-input email"
                                        placeholder="Masukkan email anda" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nomor Telepon</label>

                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-telephone"></i>
                                    </span>

                                    <input name="telephone" type="tel" class="form-control contact-input telepon "
                                        placeholder="0812-3456-7890" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Pesan Anda</label>

                                <textarea name="pesan" class="form-control contact-input" rows="4" placeholder="Masukkan pesan anda"
                                    required></textarea>
                            </div>

                            <button type="submit" class="contact-btn-submit w-100">
                                Submit Message
                            </button>

                        </form>

                    </div>
                </div>

                <!-- RIGHT SIDE -->
                <div class="col-md-6 d-none d-md-flex flex-column justify-content-between contact-right-side">

                    <div class="justify-content-right ms-auto">
                        <a href="/index.html" class="text-decoration-none text-white d-flex align-items-center gap-3">

                            <img src="/src/assets/logo/favicon.png" style="height:50px;">

                            <h1 class="fw-bold m-0">ScanGo</h1>

                        </a>
                    </div>

                    <div class="justify-content-right ms-auto">
                        <h1 class="fw-bold mb-4">
                            "Skip the hassle. Scan, and move on."
                        </h1>

                        <div class="mt-5">
                            <h5>
                                <i class="bi bi-people me-2"></i>
                                Collaborators
                            </h5>

                            <p>
                                Collaboration is at the heart of ScanGo.
                                We welcome partners, developers, and contributors
                                to join us in shaping the future together.
                            </p>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>


    <!-- <footer id="footer"></footer> -->
</body>

<!-- script component navbar -->
<script src="/src/components/navbar.js"></script>
<!-- script content collaborate -->
<script src="/src/page/content/collaborate.js"></script>
<!-- script component footer -->
<script src="/src/components/footer.js"></script>

<!-- script bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
